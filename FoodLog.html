<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Log</title>
    <link rel="stylesheet" href="FoodLog.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #f3f4f6;
        }
        .has-summary {
            background-color: #4caf50;
            color: white;
            border-radius: 50%;
        }
        .today {
            background-color: #f44336; /* Highlight current day */
            color: white;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <script src="taskbar.js"></script>
    <div class="container">
        <div class="history-tracker">
            <h2>Calendar</h2>
            <div class="calendar"></div>
        </div>
        <div class="meal-entries">
            <h2>Meal Entries</h2>
            <textarea id="breakfast" placeholder="Breakfast (max 5 entries) ex: eggs - 100"></textarea>
            <textarea id="lunch" placeholder="Lunch (max 5 entries) ex: burger - 300"></textarea>
            <textarea id="dinner" placeholder="Dinner (max 5 entries) ex steak - 450"></textarea>
            <button id="submit-meals-button">Submit Meals</button>
        </div>
        <div class="daily-summary">
            <h2>Daily Summary</h2>
            <p id="summaryDisplay">Enter your meals to see the summary.</p>
        </div>
        <div class="ai-help-bot">
            <h2>AI Health Bot</h2>
            <p>Need tips or guidance? Ask the bot!</p>
            <button>Chat with Bot</button>
        </div>
        <div class="history-log">
            <h2>Meal History</h2>
            <p id="mealHistory">Enter meals to see the history.</p>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const mealEntryInputs = document.querySelectorAll('textarea');
            const submitMealsButton = document.querySelector('#submit-meals-button');
            const summaryDisplay = document.getElementById('summaryDisplay');
            const mealHistoryDisplay = document.getElementById('mealHistory');
            const calendarDiv = document.querySelector('.calendar');
            const currentDate = new Date();
            const currentMonth = currentDate.getMonth();
            const currentYear = currentDate.getFullYear();
            const currentDateStr = currentDate.toISOString().split('T')[0]; // Current date in YYYY-MM-DD format
            let summaries = JSON.parse(localStorage.getItem("dailySummaries")) || {};

            // Function to display the summary for a given date
            function displaySummary(date) {
                if (summaries[date]) {
                    const data = summaries[date];
                    summaryDisplay.innerHTML = `<p><strong>Calories Consumed:</strong> ${data.calories} kcal</p>`;
                    mealHistoryDisplay.innerHTML = `
                        <p><strong>Breakfast:</strong> ${data.breakfast.join("<br>") || "No entries"}</p>
                        <p><strong>Lunch:</strong> ${data.lunch.join("<br>") || "No entries"}</p>
                        <p><strong>Dinner:</strong> ${data.dinner.join("<br>") || "No entries"}</p>
                    `;
                } else {
                    summaryDisplay.innerHTML = "No summary available.";
                    mealHistoryDisplay.innerHTML = "No meal history available.";
                }
            }

            // Real-time update of the daily summary and meal history
            function updateSummary() {
                let totalCalories = 0;
                let mealData = { breakfast: [], lunch: [], dinner: [] };

                mealEntryInputs.forEach(input => {
                    const mealType = input.id;
                    const foodEntries = input.value.trim().split('\n').slice(0, 5);
                    foodEntries.forEach(entry => {
                        const [foodName, calories] = entry.split('-').map(str => str.trim());
                        if (foodName && !isNaN(calories)) {
                            totalCalories += Number(calories);
                            mealData[mealType].push(`${foodName} - ${calories} kcal`);
                        }
                    });
                });

                summaries[currentDateStr] = { calories: totalCalories, ...mealData };
                localStorage.setItem("dailySummaries", JSON.stringify(summaries));
                displaySummary(currentDateStr); // Update the displayed summary
            }

            submitMealsButton.addEventListener('click', () => {
                updateSummary();
            });

            // Highlight today's date in the calendar
            function highlightToday() {
                document.querySelectorAll('.day').forEach(day => {
                    const dateStr = day.getAttribute('data-date');
                    if (dateStr === currentDateStr) {
                        day.classList.add("today");
                    }
                });
            }

            // Render the calendar
            function renderCalendar(month, year) {
                const firstDay = new Date(year, month).getDay();
                const lastDate = new Date(year, month + 1, 0).getDate();
                let calendarHTML = '';
                for (let i = 0; i < firstDay; i++) calendarHTML += `<div class="empty"></div>`;
                for (let day = 1; day <= lastDate; day++) {
                    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    calendarHTML += `<div class="day" data-date="${dateStr}">${day}</div>`;
                }
                calendarDiv.innerHTML = calendarHTML;
                highlightToday();
                highlightDates();

                // Add click event to each calendar day
                document.querySelectorAll('.day').forEach(day => {
                    day.addEventListener('click', function () {
                        const selectedDate = this.getAttribute('data-date');
                        displaySummary(selectedDate); // Show summary for the clicked date
                    });
                });
            }

            // Highlight days with saved summaries
            function highlightDates() {
                document.querySelectorAll('.day').forEach(day => {
                    const date = day.getAttribute('data-date');
                    if (summaries[date]) {
                        day.classList.add("has-summary");
                    } else {
                        day.classList.remove("has-summary");
                    }
                });
            }

            //show today's info by default
            renderCalendar(currentMonth, currentYear);
            updateSummary(); // Display today's information
        });
    </script>
</body>
</html>
