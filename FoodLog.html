<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Log</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>FOOD LOG</h1>
            <div class="user-profile">User Profile</div>
        </header>

        <div class="history-tracker">
            <h2>History Tracker</h2>
            <div class="calendar"></div>
        </div>

        <div class="meal-entries">
            <h2>Breakfast</h2>
            <textarea placeholder="Enter breakfast details..."></textarea>

            <h2>Lunch</h2>
            <textarea placeholder="Enter lunch details..."></textarea>

            <h2>Dinner</h2>
            <textarea placeholder="Enter dinner details..."></textarea>
        </div>

        <div class="daily-summary">
            <h2>Daily Summary</h2>
            <p>Calories Consumed: <span id="calories-consumed">0</span></p>
            <p>Calories Burned: <span id="calories-burned">0</span></p>
        </div>

        <div class="ai-help-bot">
            <h2>Got a question?</h2>
            <p>AI Help Bot is here to assist you!</p>
        </div>

        <div class="history-log">
            <h2>History Log</h2>
            <p>Click on a date for details.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
