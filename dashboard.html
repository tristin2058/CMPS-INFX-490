<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Tracker Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="layout">
        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <h1>Welcome Back!</h1>
                <button id="profileButton" class="profile-btn"><i class="fas fa-user-circle"></i></button>
                <!-- Dropdown Menu -->
                <div class="dropdown">
                    <button class="dropbtn">Menu <i class="fas fa-caret-down"></i></button>
                    <div class="dropdown-content">
                        <a href="#" id="dashboardNav"><i class="fas fa-home"></i> Dashboard</a>
                        <a href="#" id="profileNav"><i class="fas fa-user"></i> Profile</a>
                    </div>
                </div>
            </header>

            <!-- Track Your Health Section -->
            <section class="track-health">
                <div class="health-card">
                    <h2>Track Your Health</h2>
                    <div class="health-inputs">
                        <div class="input-box">
                            <label for="steps">Steps:</label>
                            <input type="number" id="steps" placeholder="Enter steps" required>
                        </div>
                        <div class="input-box">
                            <label for="waterIntake">Water Intake (L):</label>
                            <input type="number" id="waterIntake" step="0.1" placeholder="Enter water intake" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-save">Save Data</button>
                </div>
            </section>

            <!-- Today's Overview Section -->
            <section class="overview">
                <h2>Today's Overview</h2>
                <div class="metrics">
                    <div class="metric-card">
                        <h3>Steps</h3>
                        <p id="stepsDisplay">🚶 0</p>
                    </div>
                    <div class="metric-card">
                        <h3>Calories Burned</h3>
                        <p id="caloriesBurnedDisplay">🔥 0 kcal</p>
                    </div>
                    <div class="metric-card">
                        <h3>Water Intake</h3>
                        <p id="waterIntakeDisplay">💧 0L</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Profile Modal -->
    <div id="profileModal" class="modal hidden">
        <div class="modal-content">
            <h2>Your Profile</h2>
            <p id="userEmail">Loading...</p>
            <button id="logoutButton" class="btn-danger">Logout</button>
            <button id="closeProfile" class="btn-secondary">Cancel</button>
        </div>
    </div>

    <script type="module" src="dashboard.js"></script>
</body>
</html>
