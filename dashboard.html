<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Tracker Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
    
    <!-- Taskbar -->
    <script src="taskbar.js"></script> 

    <div class="layout">
        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <h1>Welcome Back!</h1>
                <button id="profileButton" class="profile-btn"><i class="fas fa-user-circle"></i></button>
            </header>

            <!-- Track Your Health Section -->
            <section class="track-health">
                <div class="health-card">
                    <h2>Track Your Health</h2>
                    <div class="health-inputs">
                        <div class="input-box">
                            <label for="steps">Steps:</label>
                            <input type="number" id="steps" placeholder="Enter steps" required>
                        </div>
                        <div class="input-box">
                            <label for="waterIntake">Water Intake:</label>
                            <input type="number" id="waterAmount" step="0.1" placeholder="Enter amount" required>
                            <select id="waterUnit" required>
                                <option value="liters">Liters</option>
                                <option value="cups">Cups</option>
                                <option value="gallons">Gallons</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn-save">Save Data</button>
                    <button type="button" class="btn-undo" style="display: none;">Undo Last Entry</button>
                </div>
            </section>

            <!-- Today's Overview Section -->
            <section class="overview">
                <h2>Today's Overview</h2>
                <div class="metrics">
                    <div class="metric-card">
                        <h3>Steps</h3>
                        <p id="stepsDisplay">🚶 0</p>
                    </div>
                    <div class="metric-card">
                        <h3>Calories Burned</h3>
                        <p id="caloriesBurnedDisplay">🔥 0 kcal</p>
                    </div>
                    <div class="metric-card">
                        <h3>Water Intake</h3>
                        <p id="waterIntakeDisplay">💧 0L</p>
                    </div>
                </div>
            </section>

            <!-- History Section -->
            <section class="history">
                <h2>History</h2>
            </section>
        </main>
    </div>

</body>
</html>
