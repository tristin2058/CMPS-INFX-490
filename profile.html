<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile</title>
  <link rel="stylesheet" href="profile.css" />
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script type="module" src="chatbot-ui.js"></script>
</head>
<body>
  <script src="TaskBar.js"></script>

  <main>
    <!-- Profile Header -->
    <section class="profile-header">
      <div>
        <img id="profileImage" src="place-holder-image.jpg" alt="Profile Picture" />
        <input type="file" id="profileImageInput" />
      </div>
      <div class="profile-text">
        <h2 id="displayName"></h2>
        <p id="username"></p>
        <p id="pronounsDisplay" class="fade-toggle show"></p>

        <div class="fade-toggle show">
          <p id="bio"></p>
        </div>
        <div class="fade-toggle">
          <textarea id="editBio"></textarea>
          <small id="bioCharCount">0/200</small>
        </div>

        <div class="fade-toggle">
          <select id="editPronouns">
            <option value="">—</option>
            <option value="He/Him">He/Him</option>
            <option value="She/Her">She/Her</option>
            <option value="They/Them">They/Them</option>
            <option value="Any Pronouns">Any Pronouns</option>
            <option value="Custom">Custom</option>
          </select>
          <input type="text" id="customPronouns" placeholder="Enter custom pronouns" style="display: none;" />
        </div>
      </div>
    </section>

    <!-- Stats Section -->
    <section class="stats-section">
      <div class="stat-card">
        <h3>Age</h3>
        <div class="fade-toggle show">
          <p id="age"></p>
        </div>
        <div class="fade-toggle">
          <input id="editAge" type="number" />
        </div>
      </div>

      <div class="stat-card">
        <h3>Height</h3>
      
        <!-- View Mode -->
        <div class="fade-toggle show">
          <p id="height"></p>
        </div>
      
        <!-- Edit Mode -->
        <div class="fade-toggle">
          <!-- Metric input -->
          <input id="editHeightCm" type="number" placeholder="Height in cm" />
      
          <!-- Imperial inputs -->
          <div id="editHeightImperial" style="display: none; display: flex; gap: 10px;">
            <input id="editHeightFt" type="number" placeholder="ft" />
            <input id="editHeightIn" type="number" placeholder="in" />
          </div>
      
          <!-- Unit selector -->
          <select id="heightUnit">
            <option value="cm">cm</option>
            <option value="ft">ft/in</option>
          </select>
        </div>
      </div>
      
      

      <div class="stat-card">
        <h3>Weight</h3>
        <div class="fade-toggle show">
          <p id="weight"></p>
        </div>
        <div class="fade-toggle">
          <input id="editWeight" type="number" />
          <select id="weightUnit">
            <option value="kg">kg</option>
            <option value="lb">lb</option>
          </select>
        </div>
      </div>

      <div class="stat-card">
        <h3>Gender</h3>
        <div class="fade-toggle show">
          <p id="gender"></p>
        </div>
        <div class="fade-toggle">
          <select id="editGender">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
          <input type="text" id="customGender" placeholder="Enter custom gender" style="display: none;" />
        </div>
      </div>

      <div class="stat-card">
        <h3>BMI</h3>
        <p><span id="bmi"></span> <span id="bmiStatus"></span></p>
      </div>

      <div class="stat-card">
        <h3>Member Since</h3>
        <p id="registeredAt">—</p>
      </div>

      <div class="stat-card">
        <h3>Last Login</h3>
        <p id="lastLogin">—</p>
      </div>
    </section>

    <!-- Buttons -->
    <section class="button-container">
      <button id="editProfileButton">Edit Profile</button>
      <button id="saveProfileButton" style="display: none;">Save Changes</button>
      <button id="cancelEditButton" style="display: none;">Cancel</button>
    </section>

    <!-- Dashboard (Unchanged) -->
    <section class="dashboard-section">
      <div class="dashboard-card">
        <h3>Current Goals</h3>
        <p id="goals">[Coming Soon]</p>
      </div>
      <div class="dashboard-card">
        <h3>Milestones</h3>
        <p id="milestones">[Coming Soon]</p>
      </div>
      <div class="dashboard-card">
        <h3>Recent Logs</h3>
        <div id="logHistory">[Coming Soon]</div>
      </div>
      <div class="dashboard-card">
        <h3>Progress Charts</h3>
        <div id="charts">[Coming Soon]</div>
      </div>
    </section>
  </main>
   <!-- Image URL handling -->
   <script>
    document.getElementById('applyImageURL').addEventListener('click', () => {
      const imageUrl = document.getElementById('profileImageURL').value;
      const profileImg = document.getElementById('profileImage');

      if (imageUrl && imageUrl.match(/^https?:\/\/.+\.(jpg|jpeg|png|gif|webp)$/i)) {
        profileImg.src = imageUrl;
      } else {
        alert('Please enter a valid image URL (ending in .jpg, .png, etc.)');
      }
    });
  </script>
  <script type="module" src="profile.js"></script>
</body>
</html>
