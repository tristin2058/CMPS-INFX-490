<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile</title>
  <link rel="stylesheet" href="profile.css" />
</head>
<body>
  
  <script src="taskbar.js"></script>

  <main>
    <!-- Profile Picture and Basic Info -->
    <section class="profile-header">
      <div>
        <img id="profileImage" src="place-holder-image.jpg" alt="Profile Picture" />
        <input type="file" id="profileImageInput" />
      </div>
      <div class="profile-text">
        <h2 id="displayName"></h2>
        <p id="username"></p>

        <div class="fade-toggle show">
          <p id="bio"></p>
        </div>
        <div class="fade-toggle">
          <textarea id="editBio"></textarea>
          <small id="bioCharCount">0/200</small>
        </div>
      </div>
    </section>

    <!-- Stats Section -->
    <section class="stats-section">
      <div class="stat-card">
        <h3>Age</h3>
        <div class="fade-toggle show">
          <p id="age"></p>
        </div>
        <div class="fade-toggle">
          <input id="editAge" type="number" />
        </div>
      </div>

      <div class="stat-card">
        <h3>Height</h3>
        <div class="fade-toggle show">
          <p id="height"></p>
        </div>
        <div class="fade-toggle">
          <input id="editHeight" type="number" />
          <select id="heightUnit">
            <option value="cm">cm</option>
            <option value="in">in</option>
            <option value="ft">ft</option>
          </select>
        </div>
      </div>

      <div class="stat-card">
        <h3>Weight</h3>
        <div class="fade-toggle show">
          <p id="weight"></p>
        </div>
        <div class="fade-toggle">
          <input id="editWeight" type="number" />
          <select id="weightUnit">
            <option value="kg">kg</option>
            <option value="lb">lb</option>
          </select>
        </div>
      </div>

      <div class="stat-card">
        <h3>Gender</h3>
        <div class="fade-toggle show">
          <p id="gender"></p>
        </div>
        <div class="fade-toggle">
          <select id="editGender">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>

      <div class="stat-card">
        <h3>BMI</h3>
        <p><span id="bmi"></span> <span id="bmiStatus"></span></p>
      </div>
      <div class="stat-card">
        <h3>Member Since</h3>
        <p id="registeredAt">—</p>
      </div>
      <div class="stat-card">
        <h3>Last Login</h3>
        <p id="lastLogin">—</p>
      </div>
    </section>

    <!-- Action Buttons -->
    <section class="button-container">
      <button id="editProfileButton">Edit Profile</button>
      <button id="saveProfileButton" style="display: none;">Save Changes</button>
      <button id="cancelEditButton" style="display: none;">Cancel</button>
    </section>

    <!-- Dashboard Style Cards -->
    <section class="dashboard-section">
      <div class="dashboard-card">
        <h3>Current Goals</h3>
        <p id="goals">[Coming Soon]</p>
      </div>
      <div class="dashboard-card">
        <h3>Milestones</h3>
        <p id="milestones">[Coming Soon]</p>
      </div>
      <div class="dashboard-card">
        <h3>Recent Logs</h3>
        <div id="logHistory">[Coming Soon]</div>
      </div>
      <div class="dashboard-card">
        <h3>Progress Charts</h3>
        <div id="charts">[Coming Soon]</div>
      </div>
    </section>
  </main>

  <script type="module" src="profile.js"></script>
  <script>
    function logout() {
      import('./firebase-config.js').then(({ auth }) => {
        import('https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js').then(({ signOut }) => {
          signOut(auth).then(() => {
            alert('Logged out successfully!');
            window.location.href = 'sign-in.html';
          });
        });
      });
    }
  </script>
</body>
</html>
