<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Your Account</title>
  <link rel="stylesheet" href="registration.css">
</head>
<body>
  <div class="auth-container">
    <h1>Create Your Fitness Profile</h1>

    <form id="registrationForm">
      <div class="form-row-group">
        <div class="form-row">
          <div class="form-group">
            <input type="text" id="displayName" placeholder="Display Name" required>
          </div>
          <div class="form-group">
            <input type="text" id="username" placeholder="Username" required>
          </div>
        </div>
      </div>
    
      <div class="form-row-group">
        <div class="form-row">
          <div class="form-group">
            <input type="email" id="email" placeholder="Email" required>
          </div>
          <div class="form-group">
            <input type="password" id="password" placeholder="Password" required>
          </div>
        </div>
      </div>
    
      <div class="form-row-group">
        <div class="form-row">
          <div class="form-group">
            <input type="number" id="age" placeholder="Age" required>
          </div>
          <div class="form-group">
            <input type="text" id="gender" placeholder="Gender" required>
          </div>
        </div>
      </div>
    
      <div class="form-row-group">
        <div class="form-row">
          <div class="form-group">
            <input type="number" id="height" placeholder="Height" required>
          </div>
          <div class="form-group unit-select">
            <select id="heightUnit">
              <option value="cm">cm</option>
              <option value="m">m</option>
              <option value="in">in</option>
              <option value="ft">ft</option>
            </select>
          </div>
        </div>
      </div>
    
      <div class="form-row-group">
        <div class="form-row">
          <div class="form-group">
            <input type="number" id="weight" placeholder="Weight" required>
          </div>
          <div class="form-group unit-select">
            <select id="weightUnit">
              <option value="kg">kg</option>
              <option value="lb">lb</option>
            </select>
          </div>
        </div>
      </div>
    
      <div class="form-row-group">
        <div class="form-row">
          <div class="form-group full-width">
            <button type="submit">Register</button>
          </div>
        </div>
      </div>
    </form>
    
    

    <p>Already have an account? <a href="sign-in.html">Log in</a></p>

    <script type="module" src="registration.js"></script>
  </div>
</body>
</html>
