<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Tracker Login</title>
    <link rel="stylesheet" href="sign-in.css">
</head>
<body>
    
    <div class="auth-container">

        <div class="extra-info">
            <p id="quoteDisplay">💡 Loading motivational quote...</p>
        </div>

        <h1>Join Our Health & Fitness Community</h1>

        <!-- Register Section -->
        <div id="registerSection">
            <h2>Create an Account</h2>
            <form id="registerForm">
                <input type="email" id="registerEmail" placeholder="Enter your email" required>
                <input type="password" id="registerPassword" placeholder="Create a password" required>
                <button type="submit">Sign-Up</button>
            </form>
            <p>Already have an account? <a id="showLogin" href="#">Log in</a></p>
        </div>



        <!-- Login Section -->
        <div id="loginSection" style="display: none;"> <!-- Hidden by default -->
            <h2>Welcome Back!</h2>
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="Enter your email" required>
                <input type="password" id="loginPassword" placeholder="Enter your password" required>
                <button type="submit">Log In</button>
            </form>
            <p>Don't have an account? <a id="showRegister" href="#">Sign up</a></p>
        </div>

        


    </div>

    <script type="module" src="sign-in.js"></script>
</body>
</html>
